<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venix Time Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #e2e8f0; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      max-width: 600px;
    }

    .hero h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: #94a3b8;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .timer-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 2rem;
    }

    .timer-display {
      font-size: 3.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: center;
      color: #f8fafc;
      margin-bottom: 1.5rem;
      letter-spacing: 2px;
    }

    .timer-controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }

    .btn {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    .task-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      margin-bottom: 1.5rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .task-input:focus {
      border-color: #6366f1;
    }

    .task-input::placeholder {
      color: #64748b;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 1.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #475569;
      font-size: 0.85rem;
      border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">V</div>
      Venix Time Tracker
    </div>
    <ul class="nav-links">
      <li><a href="#">Dashboard</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Reports</a></li>
    </ul>
  </header>

  <main>
    <div class="hero">
      <h1>Track Your Time</h1>
      <p>Simple, fast, and beautiful time tracking for teams and individuals.</p>
    </div>

    <div class="timer-card">
      <input type="text" class="task-input" id="taskName" placeholder="What are you working on?">
      <div class="timer-display" id="timer">00:00:00</div>
      <div class="timer-controls">
        <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">Start</button>
        <button class="btn btn-secondary" onclick="resetTimer()">Reset</button>
      </div>
    </div>

    <div class="status-badge">
      <span class="status-dot"></span>
      Deployment test — successfully live on Vercel
    </div>
  </main>

  <footer>
    Venix Time Tracker &copy; 2026
  </footer>

  <script>
    let seconds = 0;
    let interval = null;
    let running = false;

    function toggleTimer() {
      const btn = document.getElementById('startBtn');
      if (running) {
        clearInterval(interval);
        btn.textContent = 'Start';
        running = false;
      } else {
        interval = setInterval(() => {
          seconds++;
          document.getElementById('timer').textContent = formatTime(seconds);
        }, 1000);
        btn.textContent = 'Stop';
        running = true;
      }
    }

    function resetTimer() {
      clearInterval(interval);
      seconds = 0;
      running = false;
      document.getElementById('timer').textContent = '00:00:00';
      document.getElementById('startBtn').textContent = 'Start';
    }

    function formatTime(totalSeconds) {
      const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      const s = String(totalSeconds % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }
  </script>
</body>
</html>
